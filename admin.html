<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Tokio Sushi</title>
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: #1e293b;
            --primary: #e11d48;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }
        .admin-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .header {
            background-color: var(--primary);
            text-align: center;
            padding: 1.5rem;
        }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .header p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.9; }
        
        /* Sistema de Pestañas */
        .tabs {
            display: flex;
            background-color: #162032;
        }
        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: var(--text-main);
            border-bottom: 3px solid var(--primary);
            background-color: var(--card-bg);
        }
        
        /* Formularios */
        .tab-content {
            display: none;
            padding: 2rem;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--input-bg);
            border: 1px solid #334155;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-submit:hover { background-color: #be123c; }

        /* Contenedor dinámico de items para combos */
        .combo-items-container {
            background-color: var(--input-bg);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #334155;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header">
            <h1>🍣 PANEL DE ADMINISTRACIÓN</h1>
            <p>Gestión Modular de Tokio Sushi</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('productos')">📦 Productos Individuales</button>
            <button class="tab-btn" onclick="switchTab('combos')">🍱 Armar Combos</button>
        </div>

        <div id="tab-productos" class="tab-content active">
            <form id="form-producto">
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="prod-nombre" placeholder="Ej: Coca Cola 355ml" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Categoría</label>
                        <select id="prod-categoria" required>
                            <option value="Roles">Roles</option>
                            <option value="Bebidas">Bebidas</option>
                            <option value="Entradas">Entradas</option>
                            <option value="Postres">Postres</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Precio ($)</label>
                        <input type="number" id="prod-precio" step="0.01" placeholder="0.00" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Descripción Corta</label>
                    <textarea id="prod-descripcion" rows="2" placeholder="Detalles del producto..."></textarea>
                </div>
                <button type="submit" class="btn-submit">💾 Guardar Producto</button>
            </form>
        </div>

        <div id="tab-combos" class="tab-content">
            <form id="form-combo">
                <div class="form-group">
                    <label>Nombre del Combo</label>
                    <input type="text" id="combo-nombre" placeholder="Ej: Combo Dúo Sushi" required>
                </div>
                <div class="form-group">
                    <label>Precio Especial del Combo ($)</label>
                    <input type="number" id="combo-precio" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>URL de la Imagen</label>
                    <input type="text" id="combo-imagen" placeholder="Debe terminar en .jpg, .png o .webp">
                </div>
                
                <div class="combo-items-container">
                    <label style="color: white; margin-bottom: 10px;">🛒 Productos incluidos en este combo:</label>
                    <div id="lista-items-combo">
                        </div>
                    <button type="button" id="btn-add-item" style="margin-top: 10px; background: #334155; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
                        + Añadir otro producto
                    </button>
                </div>

                <div class="form-group">
                    <label>Descripción del Combo</label>
                    <textarea id="combo-descripcion" rows="2" placeholder="Ej: Incluye 2 roles y 2 bebidas..."></textarea>
                </div>
                <button type="submit" class="btn-submit">🍱 Guardar Combo</button>
            </form>
        </div>

    </div>

    <script>
        // Lógica simple para cambiar de pestañas
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById('tab-' + tabName).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
