<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokio Sushi - Estadísticas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-white flex items-center gap-3">
                <i class="fa-solid fa-chart-pie text-indigo-500"></i> Panel de Estadísticas
            </h1>
            <p class="text-sm text-slate-400 mt-1">Análisis de ventas, clientes y repartidores</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-2 bg-slate-900 p-2 rounded-lg border border-slate-700">
            <button onclick="aplicarFiltroEstadisticas('hoy')" class="filtro-btn bg-indigo-600 text-white px-3 py-1.5 rounded text-xs font-bold transition">Hoy</button>
            <button onclick="aplicarFiltroEstadisticas('ayer')" class="filtro-btn bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-xs font-bold transition">Ayer</button>
            <button onclick="aplicarFiltroEstadisticas('semana')" class="filtro-btn bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-xs font-bold transition">Esta Semana</button>
            <button onclick="aplicarFiltroEstadisticas('mes')" class="filtro-btn bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-xs font-bold transition">Este Mes</button>
            <div class="h-6 w-px bg-slate-700 mx-1"></div>
            <input type="date" id="fechaCustom" onchange="aplicarFiltroEstadisticas('custom')" class="bg-slate-800 border border-slate-600 rounded px-2 py-1 text-xs text-white outline-none focus:border-indigo-500">
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
        
        <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-xl flex flex-col justify-center">
            <span class="text-[10px] uppercase text-slate-500 font-bold tracking-wider mb-2">Ingresos Totales</span>
            <h2 id="widgetTotalUSD" class="text-4xl font-bold text-emerald-400">$0.00</h2>
            <p id="widgetTotalBS" class="text-sm font-semibold text-amber-500 mt-1">Bs. 0.00</p>
            <p id="widgetCantPedidos" class="text-xs text-slate-400 mt-3"><i class="fa-solid fa-receipt"></i> 0 pedidos procesados</p>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-xl col-span-1 md:col-span-2 lg:col-span-1 flex flex-col items-center justify-center">
            <span class="text-[10px] uppercase text-slate-500 font-bold tracking-wider mb-2 w-full text-left">Métodos de Pago</span>
            <div class="relative w-full h-40 flex justify-center">
                <canvas id="graficoPagos"></canvas>
            </div>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-xl col-span-1 lg:col-span-2">
            <span class="text-[10px] uppercase text-slate-500 font-bold tracking-wider mb-3 block"><i class="fa-solid fa-crown text-amber-400"></i> Mejores Clientes</span>
            <div id="listaClientes" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-xl col-span-1 md:col-span-2">
            <span class="text-[10px] uppercase text-slate-500 font-bold tracking-wider mb-3 block"><i class="fa-solid fa-fire text-orange-500"></i> Productos Más Vendidos</span>
            <div id="listaProductos" class="space-y-2 max-h-48 overflow-y-auto pr-2"></div>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-xl col-span-1 md:col-span-2">
            <span class="text-[10px] uppercase text-slate-500 font-bold tracking-wider mb-3 block"><i class="fa-solid fa-motorcycle text-sky-400"></i> Nómina de Repartidores</span>
            <div id="listaRepartidores" class="space-y-3 max-h-48 overflow-y-auto pr-2"></div>
        </div>
        
        <div class="col-span-full bg-slate-900/80 border border-slate-800 rounded-xl p-6 mt-2 shadow-lg">
            <h3 class="text-emerald-400 text-sm font-bold mb-4 flex items-center gap-2 border-b border-slate-700/50 pb-3 uppercase tracking-wider">
                <i class="fa-solid fa-check-double"></i> Historial de Pedidos Finalizados
            </h3>
            <div id="historial-finalizados-container" class="max-h-[400px] overflow-y-auto flex flex-col gap-3 pr-2">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <!-- ========================================== -->
    <!-- MODAL DE HISTORIAL DE REPARTIDORES -->
    <!-- ========================================== -->
    <div id="modal-repartidor" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden transform scale-95 transition-transform duration-300" id="modal-repartidor-content">
            <!-- Cabecera -->
            <div class="flex justify-between items-center p-5 border-b border-slate-800 bg-slate-800/50">
                <h3 class="text-lg font-bold text-sky-400 flex items-center gap-2">
                    <i class="fa-solid fa-motorcycle"></i> Historial de Entregas: <span id="modal-nombre-repartidor" class="text-white"></span>
                </h3>
                <button onclick="cerrarModalRepartidor()" class="text-slate-400 hover:text-white transition text-2xl leading-none">&times;</button>
            </div>
            
            <!-- Cuerpo (Lista de pedidos) -->
            <div class="p-5 max-h-[60vh] overflow-y-auto" id="modal-lista-pedidos">
                <!-- Aquí se inyectan las tarjetas con JS -->
            </div>
            
            <!-- Pie (Total) -->
            <div class="p-4 border-t border-slate-800 bg-slate-950 flex justify-between items-center">
                <span class="text-sm text-slate-400 uppercase font-bold tracking-wider">Total deuda acumulada:</span>
                <span class="text-xl font-bold text-emerald-400" id="modal-total-repartidor">$0.00</span>
            </div>
        </div>
    </div>
</body>
</html>
