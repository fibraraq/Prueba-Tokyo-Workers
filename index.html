<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokio Sushi - Control de Operaciones</title>
    <!-- Tailwind CSS v4 mediante CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- PANTALLA DE INICIO DE SESIÓN -->
    <div id="vistaLogin" class="fixed inset-0 bg-slate-950 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl max-w-md w-full p-8 shadow-2xl space-y-6">
            <div class="text-center space-y-2">
                <span class="text-5xl">🍣</span>
                <h2 class="text-2xl font-bold text-white tracking-tight">Acceso Operativo</h2>
                <p class="text-xs text-slate-400">Tokio Sushi - Control de Pedidos</p>
            </div>

            <form id="formLogin" onsubmit="iniciarSesion(event)" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase font-bold text-slate-400 mb-1">Nombre de Usuario</label>
                    <input type="text" id="loginUsername" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition" placeholder="Ej. cajero_carlos">
                </div>

                <div>
                    <label class="block text-xs uppercase font-bold text-slate-400 mb-1">PIN / Código de Acceso</label>
                    <input type="password" id="loginPIN" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 tracking-widest text-center text-lg transition" placeholder="••••">
                </div>

                <div id="loginError" class="bg-red-500/15 border border-red-500/30 text-red-400 text-xs p-3 rounded-lg text-center hidden">
                    Credenciales incorrectas.
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl transition shadow-lg cursor-pointer">
                    Entrar al Sistema <i class="fa-solid fa-arrow-right-to-bracket ml-1"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- VISTA PRINCIPAL DEL DASHBOARD (Oculta por defecto hasta loguearse) -->
    <div id="vistaDashboard" class="hidden flex-col min-h-screen">
        <!-- Encabezado del Sistema -->
        <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 shadow-lg">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🍣</span>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-white">Tokio Sushi</h1>
                        <p class="text-xs text-slate-400">Operaciones de Cocina</p>
                    </div>
                </div>
                
                <!-- Datos del Operador Activo e Interfaz de Control -->
                <div class="flex flex-wrap items-center gap-4">
                    <!-- Badge del Operador Logueado -->
                    <div id="badgeUsuario" class="flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700">
                        <!-- Inyección vía JavaScript -->
                    </div>

                    <!-- Tasa de Cambio Manual BCV -->
                    <div class="flex items-center bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-600">
                        <span class="text-xs text-slate-400 mr-2">Tasa BCV (Bs/$):</span>
                        <input type="number" id="tasaBCV" value="45.00" step="0.01" class="w-16 bg-slate-800 text-white text-sm font-semibold text-center border border-slate-600 rounded px-1 focus:outline-none focus:border-indigo-500">
                    </div>

                    <!-- Sondeo Automático (Polling de 15 segundos) -->
                    <div class="flex items-center gap-2 bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-600">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        <span class="text-xs text-slate-300">Sondeo: <span id="contadorSegundos" class="font-mono">15</span>s</span>
                    </div>

                    <!-- Botón Forzar Actualización -->
                    <button onclick="cargarPedidos()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-medium px-3.5 py-2 rounded-lg shadow transition duration-200 flex items-center gap-2">
                        <i class="fa-solid fa-rotate"></i>
                    </button>

                    <!-- Botón Cerrar Sesión -->
                    <button onclick="cerrarSesion()" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white text-xs font-medium px-3.5 py-2 rounded-lg border border-red-500/20 transition cursor-pointer">
                        <i class="fa-solid fa-power-off"></i> Salir
                    </button>
                </div>
            </div>
        </header>

        <!-- Tablero de Estados de Cocina -->
        <main class="flex-1 max-w-7xl w-full mx-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 h-full">
                
                <!-- Columna 1: Pago Pendiente -->
                <div class="bg-slate-800 rounded-xl p-4 border border-yellow-600/20 flex flex-col h-[calc(100vh-180px)] min-h-[500px] shadow-md">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700">
                        <h2 class="font-bold text-yellow-400 flex items-center gap-2 text-sm uppercase tracking-wide">
                            <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
                            Pago Pendiente
                        </h2>
                        <span id="cantPagoPendiente" class="bg-yellow-400/10 text-yellow-400 text-xs font-bold px-2.5 py-1 rounded-full border border-yellow-400/20">0</span>
                    </div>
                    <div id="columnaPagoPendiente" class="flex-1 overflow-y-auto space-y-3 pr-1">
                        <!-- Dinámico -->
                    </div>
                </div>

                <!-- Columna 2: En Cocina -->
                <div class="bg-slate-800 rounded-xl p-4 border border-sky-600/20 flex flex-col h-[calc(100vh-180px)] min-h-[500px] shadow-md">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700">
                        <h2 class="font-bold text-sky-400 flex items-center gap-2 text-sm uppercase tracking-wide">
                            <span class="w-2.5 h-2.5 rounded-full bg-sky-400"></span>
                            En Cocina
                        </h2>
                        <span id="cantEnCocina" class="bg-sky-400/10 text-sky-400 text-xs font-bold px-2.5 py-1 rounded-full border border-sky-400/20">0</span>
                    </div>
                    <div id="columnaEnCocina" class="flex-1 overflow-y-auto space-y-3 pr-1">
                        <!-- Dinámico -->
                    </div>
                </div>

                <!-- Columna 3: Finalizado -->
                <div class="bg-slate-800 rounded-xl p-4 border border-emerald-600/20 flex flex-col h-[calc(100vh-180px)] min-h-[500px] shadow-md">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700">
                        <h2 class="font-bold text-emerald-400 flex items-center gap-2 text-sm uppercase tracking-wide">
                            <span class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
                            Finalizado
                        </h2>
                        <span id="cantFinalizado" class="bg-emerald-400/10 text-emerald-400 text-xs font-bold px-2.5 py-1 rounded-full border border-emerald-400/20">0</span>
                    </div>
                    <div id="columnaFinalizado" class="flex-1 overflow-y-auto space-y-2 pr-1">
                        <!-- Dinámico -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Modal Detallado (Recibo Digital) -->
    <div id="modalDetalle" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-slate-800 border border-slate-700 rounded-xl max-w-md w-full p-6 shadow-2xl relative">
            <div class="flex justify-between items-start border-b border-slate-700 pb-3 mb-4">
                <div>
                    <h3 class="text-lg font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-file-invoice-dollar text-emerald-400"></i>
                        Detalle del Pedido
                    </h3>
                    <p class="text-xs text-slate-400" id="modalID">ID: ---</p>
                </div>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white transition duration-150">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <div class="space-y-4 text-sm text-slate-300" id="modalCuerpo">
                <!-- Se inyecta dinámicamente -->
            </div>

            <div class="mt-6 flex justify-end">
                <button onclick="cerrarModal()" class="bg-slate-700 hover:bg-slate-600 text-white font-medium px-4 py-2 rounded-lg transition">
                    Cerrar Recibo
                </button>
            </div>
        </div>
    </div>

    <!-- Motor JavaScript con Login y Auditoría de Procesos -->
    <script>
        // Configuración de Webhooks en n8n
        const API_OBTENER_PEDIDOS = "https://n8n-production-633e.up.railway.app/webhook/obtener-pedidos";
        const API_ACTUALIZAR_ESTADO = "https://n8n-production-633e.up.railway.app/webhook/actualizar-estado";

        // Registro Local de Usuarios y Roles del Restaurante
        const USUARIOS_SISTEMA = [
            { username: "super_admin", pin: "9999", nombre: "Propietario", rol: "superadmin" },
            { username: "gerente_tokio", pin: "5555", nombre: "Gerente de Turno", rol: "admin" },
            { username: "cajero_carlos", pin: "1234", nombre: "Carlos Gómez", rol: "cajero" },
            { username: "cajero_maria", pin: "2345", nombre: "María Delgado", rol: "cajero" }
        ];

        let usuarioActivo = null;
        let pedidosEnMemoria = [];
        let segundosFaltantes = 15;
        let pollingTimer;

        // --- SISTEMA DE TASA BCV AUTOMÁTICA (API) ---
        async function actualizarTasaBCV() {
            const inputTasa = document.getElementById('tasaBCV');
            
            try {
                // Consultamos la API pública de DolarAPI (Especializada en Venezuela)
                const response = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                if (!response.ok) throw new Error('Error al consultar la API del BCV');
                
                const data = await response.json();
                const tasaOficial = data.promedio; // Extraemos el valor numérico
                
                if (tasaOficial) {
                    inputTasa.value = parseFloat(tasaOficial).toFixed(2);
                    localStorage.setItem('tasaBCV', inputTasa.value);
                    console.log(`Tasa BCV actualizada automáticamente: Bs. ${inputTasa.value}`);
                    
                    // Efecto visual: Pone el texto verde un segundo para avisar que se actualizó con éxito
                    inputTasa.classList.add('text-emerald-400');
                    setTimeout(() => inputTasa.classList.remove('text-emerald-400'), 2000);
                }
            } catch (error) {
                console.warn("No se pudo conectar con la API del BCV. Usando tasa guardada en memoria.", error);
                // Si no hay internet o la API falla, usamos la última tasa que se guardó
                if (localStorage.getItem('tasaBCV')) {
                    inputTasa.value = localStorage.getItem('tasaBCV');
                }
            }
        }

        // Guardar manualmente si un Admin decide cambiarla a mano
        document.getElementById('tasaBCV').addEventListener('input', (e) => {
            localStorage.setItem('tasaBCV', e.target.value);
        });
        

        // --- SISTEMA DE CONTROL DE SESIONES ---
        function verificarSesion() {
            const sesionGuardada = localStorage.getItem('usuarioActivo');
            if (sesionGuardada) {
                usuarioActivo = JSON.parse(sesionGuardada);
                aplicarRestriccionesRol();
                document.getElementById('vistaLogin').classList.add('hidden');
                document.getElementById('vistaDashboard').classList.remove('hidden');
                document.getElementById('vistaDashboard').classList.add('flex');
                cargarPedidos();
            } else {
                usuarioActivo = null;
                clearInterval(pollingTimer);
                document.getElementById('vistaLogin').classList.remove('hidden');
                document.getElementById('vistaDashboard').classList.add('hidden');
                document.getElementById('vistaDashboard').classList.remove('flex');
            }
        }

        function iniciarSesion(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('loginUsername').value.trim();
            const pinInput = document.getElementById('loginPIN').value.trim();
            const errorMsg = document.getElementById('loginError');
            
            errorMsg.classList.add('hidden');

            const usuarioEncontrado = USUARIOS_SISTEMA.find(u => 
                u.username.toLowerCase() === usernameInput.toLowerCase() && u.pin === pinInput
            );

            if (usuarioEncontrado) {
                usuarioActivo = {
                    username: usuarioEncontrado.username,
                    nombre: usuarioEncontrado.nombre,
                    rol: usuarioEncontrado.rol
                };
                localStorage.setItem('usuarioActivo', JSON.stringify(usuarioActivo));
                document.getElementById('formLogin').reset();
                verificarSesion();
            } else {
                errorMsg.innerText = "Usuario o PIN de acceso incorrectos.";
                errorMsg.classList.remove('hidden');
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioActivo');
            verificarSesion();
        }

        function aplicarRestriccionesRol() {
            const inputTasa = document.getElementById('tasaBCV');
            const badgeUsuario = document.getElementById('badgeUsuario');

            if (!usuarioActivo) return;

            // Renderizar la información del operador actual en cabecera
            let colorRol = 'bg-slate-600/20 text-slate-300 border-slate-600/30';
            if (usuarioActivo.rol === 'superadmin') colorRol = 'bg-red-500/10 text-red-400 border-red-500/20';
            if (usuarioActivo.rol === 'admin') colorRol = 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20';

            badgeUsuario.innerHTML = `
                <span class="text-[10px] text-slate-400 uppercase font-semibold">Op:</span>
                <span class="text-xs font-bold text-white">${usuarioActivo.nombre}</span>
                <span class="text-[9px] uppercase font-mono font-bold px-1.5 py-0.5 rounded border ${colorRol}">
                    ${usuarioActivo.rol}
                </span>
            `;

            // Restricción crítica de tasa cambiaria
            if (usuarioActivo.rol === 'cajero') {
                inputTasa.disabled = true;
                inputTasa.classList.add('opacity-40', 'cursor-not-allowed');
            } else {
                inputTasa.disabled = false;
                inputTasa.classList.remove('opacity-40', 'cursor-not-allowed');
            }
        }

        // --- SISTEMA DE AUDITORÍA Y TRAZABILIDAD (Mandar a n8n) ---
        async function cambiarEstadoPedido(idPedido, nuevoEstado) {
            try {
                // Se genera la firma del operador que ejecuta la acción
                const operadorFirma = usuarioActivo 
                    ? `${usuarioActivo.nombre} (${usuarioActivo.rol})` 
                    : "No registrado";

                const response = await fetch(API_ACTUALIZAR_ESTADO, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id_pedido: idPedido, 
                        estado: nuevoEstado,
                        procesado_por: operadorFirma // Campo enviado a n8n para tracking
                    })
                });

                if (!response.ok) throw new Error('Error al guardar cambio de estado');
                
                cargarPedidos();
            } catch (error) {
                console.error("Error al actualizar la orden:", error);
                alert("No se pudo actualizar el estado del pedido. Intente nuevamente.");
            }
        }

        // --- MANEJO DE FECHAS (Caracas) ---
        function obtenerFechaHoyCaracas() {
            const opciones = { timeZone: 'America/Caracas', year: 'numeric', month: '2-digit', day: '2-digit' };
            const formateador = new Intl.DateTimeFormat('es-VE', opciones);
            const partes = formateador.formatToParts(new Date());
            
            const dia = partes.find(p => p.type === 'day').value;
            const mes = partes.find(p => p.type === 'month').value;
            const anio = partes.find(p => p.type === 'year').value;
            
            return { dia, mes, anio };
        }

        function esPedidoDeHoy(fechaString) {
            if (!fechaString) return false;
            
            const { dia, mes, anio } = obtenerFechaHoyCaracas();
            const fechaLimpia = fechaString.replace(/[\s\uFEFF\xA0]+/g, '');
            
            const formato1 = `${anio}-${mes}-${dia}`;
            const formato2 = `${dia}${mes}${anio}`;
            const formato3 = `${dia}/${mes}/${anio}`;
            
            return fechaLimpia.includes(formato1) || 
                   fechaLimpia.includes(formato2) || 
                   fechaLimpia.includes(formato3);
        }

        function normalizarEstado(estadoRaw) {
            if (!estadoRaw) return '';
            return estadoRaw.replace(/[\s\uFEFF\xA0]+/g, '').toLowerCase();
        }

        // --- POLLING AUTOMÁTICO ---
        function resetearYArrancarPolling() {
            segundosFaltantes = 15;
            document.getElementById('contadorSegundos').innerText = segundosFaltantes;
            
            clearInterval(pollingTimer);
            pollingTimer = setInterval(() => {
                segundosFaltantes--;
                document.getElementById('contadorSegundos').innerText = segundosFaltantes;
                if (segundosFaltantes <= 0) {
                    cargarPedidos();
                    segundosFaltantes = 15;
                }
            }, 1000);
        }

        // --- LECTURA DE DATOS ---
        async function cargarPedidos() {
            try {
                const response = await fetch(API_OBTENER_PEDIDOS);
                if (!response.ok) throw new Error('Error al conectar con la API');
                
                const datos = await response.json();
                pedidosEnMemoria = Array.isArray(datos) ? datos : [];
                
                renderizarTablero();
                resetearYArrancarPolling();
            } catch (error) {
                console.error("Error al cargar pedidos:", error);
            }
        }

        // --- RENDERIZADO DEL TABLERO ---
        function renderizarTablero() {
            const colPagoPendiente = document.getElementById('columnaPagoPendiente');
            const colEnCocina = document.getElementById('columnaEnCocina');
            const colFinalizado = document.getElementById('columnaFinalizado');

            colPagoPendiente.innerHTML = '';
            colEnCocina.innerHTML = '';
            colFinalizado.innerHTML = '';

            let conteoPago = 0;
            let conteoCocina = 0;
            let conteoFinalizado = 0;

            pedidosEnMemoria.forEach(pedido => {
                const id = pedido['ID_Pedido'] || pedido.id_pedido || 'S/ID';
                const cliente = pedido['Cliente'] || pedido.cliente || 'Desconocido';
                const montoRaw = pedido['Total Orden'] || pedido.monto || 0;
                const monto = parseFloat(montoRaw).toFixed(2);
                const fecha = pedido['Timestamp'] || pedido.timestamp || '';
                const articulos = pedido['Pedido Detallado'] || pedido.articulos || 'Detalle no disponible';
                const estadoLimpio = normalizarEstado(pedido['Estado'] || pedido.estado);

                if (!esPedidoDeHoy(fecha)) return;

                if (estadoLimpio === 'pagopendiente') {
                    conteoPago++;
                    colPagoPendiente.innerHTML += `
                        <div class="bg-slate-700/40 p-4 rounded-lg border border-yellow-500/10 hover:border-yellow-500/30 transition duration-150 space-y-3">
                            <div class="flex justify-between items-start">
                                <span class="text-xs font-bold text-yellow-400 bg-yellow-400/10 px-2 py-0.5 rounded border border-yellow-400/20">#${id}</span>
                                <span class="text-[10px] text-slate-400"><i class="fa-regular fa-clock"></i> ${formatearHora(fecha)}</span>
                            </div>
                            <div>
                                <h4 class="font-bold text-white text-sm truncate">${cliente}</h4>
                                <p class="text-xs text-slate-400 mt-1 line-clamp-2">${articulos}</p>
                            </div>
                            <div class="flex justify-between items-center pt-2 border-t border-slate-600/50">
                                <span class="text-xs font-bold text-slate-300">$${monto}</span>
                                <button onclick="cambiarEstadoPedido('${id}', 'En Cocina')" class="bg-yellow-500 hover:bg-yellow-400 text-slate-950 text-xs font-bold px-3 py-1.5 rounded-md transition duration-150 flex items-center gap-1 cursor-pointer">
                                    Aceptar <i class="fa-solid fa-arrow-right"></i>
                                </button>
                            </div>
                        </div>
                    `;
                } else if (estadoLimpio === 'encocina') {
                    conteoCocina++;
                    colEnCocina.innerHTML += `
                        <div class="bg-slate-700/40 p-4 rounded-lg border border-sky-500/10 hover:border-sky-500/30 transition duration-150 space-y-3">
                            <div class="flex justify-between items-start">
                                <span class="text-xs font-bold text-sky-400 bg-sky-400/10 px-2 py-0.5 rounded border border-sky-400/20">#${id}</span>
                                <span class="text-[10px] text-slate-400"><i class="fa-regular fa-clock"></i> ${formatearHora(fecha)}</span>
                            </div>
                            <div>
                                <h4 class="font-bold text-white text-sm truncate">${cliente}</h4>
                                <p class="text-xs text-slate-400 mt-1 line-clamp-2">${articulos}</p>
                            </div>
                            <div class="flex justify-between items-center pt-2 border-t border-slate-600/50">
                                <span class="text-xs font-bold text-slate-300">$${monto}</span>
                                <button onclick="cambiarEstadoPedido('${id}', 'Finalizado')" class="bg-sky-600 hover:bg-sky-500 text-white text-xs font-bold px-3 py-1.5 rounded-md transition duration-150 flex items-center gap-1 cursor-pointer">
                                    Despachar <i class="fa-solid fa-check"></i>
                                </button>
                            </div>
                        </div>
                    `;
                } else if (estadoLimpio === 'finalizado') {
                    conteoFinalizado++;
                    colFinalizado.innerHTML += `
                        <div onclick="abrirModalDetalle('${id}')" class="bg-slate-700/20 hover:bg-slate-700/50 p-3 rounded-lg border border-emerald-500/10 hover:border-emerald-500/30 transition duration-150 flex justify-between items-center cursor-pointer">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-semibold text-emerald-400 bg-emerald-400/10 px-2.5 py-1 rounded border border-emerald-400/20">#${id}</span>
                                <span class="text-xs text-slate-400">Ver Recibo</span>
                            </div>
                            <span class="text-sm font-bold text-emerald-400">$${monto}</span>
                        </div>
                    `;
                }
            });

            document.getElementById('cantPagoPendiente').innerText = conteoPago;
            document.getElementById('cantEnCocina').innerText = conteoCocina;
            document.getElementById('cantFinalizado').innerText = conteoFinalizado;
        }

        // --- MODAL DETALLADO (Recibo) ---
        function abrirModalDetalle(idPedido) {
            const pedido = pedidosEnMemoria.find(p => {
                const id = p['ID_Pedido'] || p.id_pedido || p.ID;
                return String(id) === String(idPedido);
            });

            if (!pedido) return;

            const id = pedido['ID_Pedido'] || 'S/ID';
            const cliente = pedido['Cliente'] || 'Cliente Registrado';
            const telefono = pedido['Teléfono'] || pedido.telefono || 'No registrado';
            const tipoEntrega = pedido['Tipo de entrega'] || 'No definido';
            const direccion = pedido['Dirección'] || pedido.direccion || 'No especificada';
            const metodoPago = pedido['Método de pago'] || 'No especificado';
            const articulos = pedido['Pedido Detallado'] || '';
            const montoUSD = parseFloat(pedido['Total Orden'] || 0);
            
            // Trazabilidad de quién lo procesó desde Google Sheets
            const procesadoPor = pedido['Procesado Por'] || 'Sin registro de operador';
            
            document.getElementById('modalID').innerText = `ID Pedido: #${id}`;

            let seccionCambioVES = '';
            const esPagoMovil = metodoPago.toLowerCase().includes('pago') || metodoPago.toLowerCase().includes('movil') || metodoPago.toLowerCase().includes('móvil');
            
            if (esPagoMovil) {
                const tasaBCV = parseFloat(document.getElementById('tasaBCV').value) || 1.0;
                const montoVES = (montoUSD * tasaBCV).toFixed(2);
                seccionCambioVES = `
                    <div class="bg-amber-500/10 border border-amber-500/20 p-3 rounded-lg mt-2 text-amber-300 text-xs text-center font-bold">
                        Total en Bolívares: Bs. ${montoVES} (Tasa: ${tasaBCV.toFixed(2)} Bs/$)
                    </div>
                `;
            }

            const modalHTML = `
                <div class="space-y-3.5">
                    <div class="flex justify-between">
                        <div>
                            <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Cliente</span>
                            <p class="font-bold text-white text-base">${cliente}</p>
                            <p class="text-xs text-slate-400 mt-0.5"><i class="fa-solid fa-phone"></i> ${telefono}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider text-right block">Despachado por</span>
                            <p class="text-xs text-white bg-slate-900 border border-slate-700 px-2 py-1 rounded mt-1 font-semibold">${procesadoPor}</p>
                        </div>
                    </div>

                    <div class="border-t border-slate-700/50 pt-2.5">
                        <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Método de Distribución</span>
                        <p class="text-white text-xs mt-0.5 font-medium">${tipoEntrega}</p>
                        <p class="text-xs text-slate-400 mt-1 bg-slate-900/40 p-2 rounded border border-slate-700/30 italic">${direccion}</p>
                    </div>

                    <div class="border-t border-slate-700/50 pt-2.5">
                        <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Productos</span>
                        <div class="text-xs bg-slate-900/40 p-2.5 rounded border border-slate-700/30 whitespace-pre-line max-h-32 overflow-y-auto text-slate-300 font-mono">
                            ${articulos}
                        </div>
                    </div>

                    <div class="border-t border-slate-700/50 pt-2.5 flex justify-between items-center">
                        <div>
                            <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Forma de Pago</span>
                            <p class="text-white text-xs font-semibold">${metodoPago}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Total</span>
                            <p class="text-emerald-400 font-bold text-lg">$${montoUSD.toFixed(2)}</p>
                        </div>
                    </div>

                    ${seccionCambioVES}
                </div>
            `;

            document.getElementById('modalCuerpo').innerHTML = modalHTML;
            document.getElementById('modalDetalle').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalDetalle').classList.add('hidden');
        }

        function formatearHora(fechaString) {
            if (!fechaString) return '--:--';
            try {
                const partes = fechaString.split(' ');
                if (partes.length > 1) {
                    return partes[1].substring(0, 5);
                }
                return fechaString.substring(11, 16) || '--:--';
            } catch (e) {
                return '--:--';
            }
        }

        // --- INICIALIZACIÓN DEL CICLO DE VIDA ---
        window.addEventListener('DOMContentLoaded', () => {
            actualizarTasaBCV();
            verificarSesion();
        });
    </script>
</body>
</html>
