<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokio Sushi - Control de Operaciones</title>
    <!-- Tailwind CSS v4 mediante CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- PANTALLA DE INICIO DE SESIÓN -->
    <div id="vistaLogin" class="fixed inset-0 bg-slate-950 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl max-w-md w-full p-8 shadow-2xl space-y-6">
            <div class="text-center space-y-2">
                <span class="text-5xl">🍣</span>
                <h2 class="text-2xl font-bold text-white tracking-tight">Acceso Operativo</h2>
                <p class="text-xs text-slate-400">Tokio Sushi - Control de Pedidos</p>
            </div>

            <form id="formLogin" onsubmit="iniciarSesion(event)" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase font-bold text-slate-400 mb-1">Nombre de Usuario</label>
                    <input type="text" id="loginUsername" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition" placeholder="Ej. cajero_carlos">
                </div>

                <div>
                    <label class="block text-xs uppercase font-bold text-slate-400 mb-1">PIN / Código de Acceso</label>
                    <input type="password" id="loginPIN" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 tracking-widest text-center text-lg transition" placeholder="••••">
                </div>

                <div id="loginError" class="bg-red-500/15 border border-red-500/30 text-red-400 text-xs p-3 rounded-lg text-center hidden">
                    Credenciales incorrectas.
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl transition shadow-lg cursor-pointer">
                    Entrar al Sistema <i class="fa-solid fa-arrow-right-to-bracket ml-1"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- VISTA PRINCIPAL DEL DASHBOARD -->
    <div id="vistaDashboard" class="hidden flex-col min-h-screen">
        <!-- Encabezado del Sistema -->
        <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 shadow-lg">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🍣</span>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-white">Tokio Sushi</h1>
                        <p class="text-xs text-slate-400">Operaciones de Cocina</p>
                    </div>
                </div>
                
                <div class="flex flex-wrap items-center gap-4">
                    <div id="badgeUsuario" class="flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700"></div>

                    <div class="flex items-center bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-600">
                        <span class="text-xs text-slate-400 mr-2">Tasa BCV (Bs/$):</span>
                        <input type="number" id="tasaBCV" value="45.00" step="0.01" class="w-24 bg-slate-800 text-white text-sm font-semibold text-center border border-slate-600 rounded px-1 focus:outline-none focus:border-indigo-500">
                    </div>

                    <div class="flex items-center gap-2 bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-600">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        <span class="text-xs text-slate-300">Sondeo: <span id="contadorSegundos" class="font-mono">15</span>s</span>
                    </div>

                    <button onclick="cargarPedidos()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-medium px-3.5 py-2 rounded-lg shadow transition duration-200 flex items-center gap-2 cursor-pointer">
                        <i class="fa-solid fa-rotate"></i>
                    </button>

                    <button onclick="cerrarSesion()" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white text-xs font-medium px-3.5 py-2 rounded-lg border border-red-500/20 transition cursor-pointer">
                        <i class="fa-solid fa-power-off"></i> Salir
                    </button>
                </div>
            </div>
        </header>

        <!-- Tablero de Estados -->
        <main class="flex-1 max-w-7xl w-full mx-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 h-full">
                
                <div class="bg-slate-800 rounded-xl p-4 border border-yellow-600/20 flex flex-col h-[calc(100vh-180px)] min-h-[500px] shadow-md">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700">
                        <h2 class="font-bold text-yellow-400 flex items-center gap-2 text-sm uppercase tracking-wide">
                            <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span> Pago Pendiente
                        </h2>
                        <span id="cantPagoPendiente" class="bg-yellow-400/10 text-yellow-400 text-xs font-bold px-2.5 py-1 rounded-full border border-yellow-400/20">0</span>
                    </div>
                    <div id="columnaPagoPendiente" class="flex-1 overflow-y-auto space-y-3 pr-1"></div>
                </div>

                <div class="bg-slate-800 rounded-xl p-4 border border-sky-600/20 flex flex-col h-[calc(100vh-180px)] min-h-[500px] shadow-md">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700">
                        <h2 class="font-bold text-sky-400 flex items-center gap-2 text-sm uppercase tracking-wide">
                            <span class="w-2.5 h-2.5 rounded-full bg-sky-400"></span> En Cocina
                        </h2>
                        <span id="cantEnCocina" class="bg-sky-400/10 text-sky-400 text-xs font-bold px-2.5 py-1 rounded-full border border-sky-400/20">0</span>
                    </div>
                    <div id="columnaEnCocina" class="flex-1 overflow-y-auto space-y-3 pr-1"></div>
                </div>

                <div class="bg-slate-800 rounded-xl p-4 border border-emerald-600/20 flex flex-col h-[calc(100vh-180px)] min-h-[500px] shadow-md">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700">
                        <h2 class="font-bold text-emerald-400 flex items-center gap-2 text-sm uppercase tracking-wide">
                            <span class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span> Finalizado
                        </h2>
                        <span id="cantFinalizado" class="bg-emerald-400/10 text-emerald-400 text-xs font-bold px-2.5 py-1 rounded-full border border-emerald-400/20">0</span>
                    </div>
                    <div id="columnaFinalizado" class="flex-1 overflow-y-auto space-y-2 pr-1"></div>
                </div>

            </div>
        </main>
    </div>

    <!-- Modal Comprobante de Pago -->
    <div id="modalComprobante" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-xl w-full max-w-sm shadow-2xl">
            <div class="p-4 border-b border-slate-700">
                <h2 class="text-lg font-bold text-emerald-400 flex items-center gap-2">
                    <i class="fa-solid fa-receipt"></i> Validar Pago
                </h2>
                <p id="txtMetodoPagoModal" class="text-xs text-slate-400 mt-1"></p>
            </div>
            <div class="p-5 space-y-4">
                <div id="contenedorReferencia">
                    <label class="block text-xs text-slate-400 mb-1 font-bold uppercase tracking-wider">Número de Referencia</label>
                    <input type="text" id="inputReferencia" placeholder="Ej. 12345678" class="w-full bg-slate-900 p-3 rounded-lg border border-slate-700 text-white focus:border-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1 font-bold uppercase tracking-wider">Subir Imagen (Capture o Billete)</label>
                    <input type="file" id="inputImagenPago" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-slate-700 file:text-emerald-400 hover:file:bg-slate-600 transition cursor-pointer">
                </div>
                <div class="mt-2 flex justify-center">
                    <img id="previewComprobante" class="hidden max-h-40 rounded-lg border border-slate-600 object-contain shadow-md">
                </div>
            </div>
            <div class="p-4 border-t border-slate-700 flex justify-end gap-2">
                <button type="button" id="btnCancelarComprobante" class="px-4 py-2 text-slate-400 hover:text-white transition font-medium cursor-pointer">Cancelar</button>
                <button type="button" id="btnAceptarComprobante" class="bg-emerald-600 px-4 py-2 rounded-lg font-bold text-white hover:bg-emerald-500 transition shadow-lg cursor-pointer">Confirmar Pago</button>
            </div>
        </div>
    </div>

    <!-- Modal Detallado (Recibo Digital) -->
    <div id="modalDetalle" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-slate-800 border border-slate-700 rounded-xl max-w-md w-full p-6 shadow-2xl relative">
            <div class="flex justify-between items-start border-b border-slate-700 pb-3 mb-4">
                <div>
                    <h3 class="text-lg font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-file-invoice-dollar text-emerald-400"></i> Detalle del Pedido
                    </h3>
                    <p class="text-xs text-slate-400" id="modalID">ID: ---</p>
                </div>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white transition duration-150 cursor-pointer">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div class="space-y-4 text-sm text-slate-300" id="modalCuerpo"></div>
            <div class="mt-6 flex justify-end">
                <button onclick="cerrarModal()" class="bg-slate-700 hover:bg-slate-600 text-white font-medium px-4 py-2 rounded-lg transition cursor-pointer">Cerrar Recibo</button>
            </div>
        </div>
    </div>

    <!-- Motor JavaScript -->
    <script>
        const API_OBTENER_PEDIDOS = "https://n8n-production-633e.up.railway.app/webhook/obtener-pedidos";
        const API_ACTUALIZAR_ESTADO = "https://n8n-production-633e.up.railway.app/webhook/actualizar-estado";

        const USUARIOS_SISTEMA = [
            { username: "super_admin", pin: "9999", nombre: "Propietario", rol: "superadmin" },
            { username: "gerente_tokio", pin: "5555", nombre: "Gerente de Turno", rol: "admin" },
            { username: "cajero_carlos", pin: "1234", nombre: "Carlos Gómez", rol: "cajero" },
            { username: "cajero_maria", pin: "2345", nombre: "María Delgado", rol: "cajero" }
        ];

        let usuarioActivo = null;
        let pedidosEnMemoria = [];
        let segundosFaltantes = 15;
        let pollingTimer;

        // --- TASA BCV ---
        async function actualizarTasaBCV() {
            const inputTasa = document.getElementById('tasaBCV');
            try {
                const response = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                if (!response.ok) throw new Error('Error API BCV');
                const data = await response.json();
                if (data.promedio) {
                    inputTasa.value = parseFloat(data.promedio).toFixed(2);
                    localStorage.setItem('tasaBCV', inputTasa.value);
                    inputTasa.classList.add('text-emerald-400');
                    setTimeout(() => inputTasa.classList.remove('text-emerald-400'), 2000);
                }
            } catch (error) {
                if (localStorage.getItem('tasaBCV')) inputTasa.value = localStorage.getItem('tasaBCV');
            }
        }
        document.getElementById('tasaBCV').addEventListener('input', (e) => localStorage.setItem('tasaBCV', e.target.value));

        // --- SESIONES ---
        function verificarSesion() {
            const sesionGuardada = localStorage.getItem('usuarioActivo');
            if (sesionGuardada) {
                usuarioActivo = JSON.parse(sesionGuardada);
                aplicarRestriccionesRol();
                document.getElementById('vistaLogin').classList.add('hidden');
                document.getElementById('vistaDashboard').classList.remove('hidden');
                document.getElementById('vistaDashboard').classList.add('flex');
                cargarPedidos();
            } else {
                usuarioActivo = null;
                clearInterval(pollingTimer);
                document.getElementById('vistaLogin').classList.remove('hidden');
                document.getElementById('vistaDashboard').classList.add('hidden');
                document.getElementById('vistaDashboard').classList.remove('flex');
            }
        }

        function iniciarSesion(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('loginUsername').value.trim();
            const pinInput = document.getElementById('loginPIN').value.trim();
            const errorMsg = document.getElementById('loginError');
            errorMsg.classList.add('hidden');

            const usuarioEncontrado = USUARIOS_SISTEMA.find(u => u.username.toLowerCase() === usernameInput.toLowerCase() && u.pin === pinInput);
            if (usuarioEncontrado) {
                usuarioActivo = { username: usuarioEncontrado.username, nombre: usuarioEncontrado.nombre, rol: usuarioEncontrado.rol };
                localStorage.setItem('usuarioActivo', JSON.stringify(usuarioActivo));
                document.getElementById('formLogin').reset();
                verificarSesion();
            } else {
                errorMsg.innerText = "Usuario o PIN de acceso incorrectos.";
                errorMsg.classList.remove('hidden');
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioActivo');
            verificarSesion();
        }

        function aplicarRestriccionesRol() {
            const inputTasa = document.getElementById('tasaBCV');
            const badgeUsuario = document.getElementById('badgeUsuario');
            if (!usuarioActivo) return;

            let colorRol = 'bg-slate-600/20 text-slate-300 border-slate-600/30';
            if (usuarioActivo.rol === 'superadmin') colorRol = 'bg-red-500/10 text-red-400 border-red-500/20';
            if (usuarioActivo.rol === 'admin') colorRol = 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20';

            badgeUsuario.innerHTML = `
                <span class="text-[10px] text-slate-400 uppercase font-semibold">Op:</span>
                <span class="text-xs font-bold text-white">${usuarioActivo.nombre}</span>
                <span class="text-[9px] uppercase font-mono font-bold px-1.5 py-0.5 rounded border ${colorRol}">${usuarioActivo.rol}</span>
            `;

            if (usuarioActivo.rol === 'cajero') {
                inputTasa.disabled = true;
                inputTasa.classList.add('opacity-40', 'cursor-not-allowed');
            } else {
                inputTasa.disabled = false;
                inputTasa.classList.remove('opacity-40', 'cursor-not-allowed');
            }
        }

        // --- LÓGICA DEL MODAL DE COMPROBANTE ---
        document.getElementById('inputImagenPago').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('previewComprobante');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            } else {
                preview.src = "";
                preview.classList.add('hidden');
            }
        });

        function pedirComprobantePago(metodoPago) {
            return new Promise((resolve) => {
                const modal = document.getElementById('modalComprobante');
                const contenedorRef = document.getElementById('contenedorReferencia');
                const inputRef = document.getElementById('inputReferencia');
                const inputImg = document.getElementById('inputImagenPago');
                const preview = document.getElementById('previewComprobante');
                const txtMetodo = document.getElementById('txtMetodoPagoModal');

                inputRef.value = '';
                inputImg.value = '';
                preview.src = '';
                preview.classList.add('hidden');
                
                const metodoLimpio = metodoPago || "Desconocido";
                txtMetodo.innerText = `Método de pago del cliente: ${metodoLimpio}`;

                if (metodoLimpio.toLowerCase().includes('efectivo')) {
                    contenedorRef.classList.add('hidden');
                } else {
                    contenedorRef.classList.remove('hidden');
                }

                modal.classList.remove('hidden');

                document.getElementById('btnAceptarComprobante').onclick = () => {
                    if (inputImg.files.length === 0) {
                        alert("Para continuar, sube una imagen del comprobante o billete.");
                        return;
                    }
                    if (!contenedorRef.classList.contains('hidden') && inputRef.value.trim() === '') {
                        alert("Por favor, ingresa el número de referencia.");
                        return;
                    }
                    modal.classList.add('hidden');
                    resolve({ referencia: inputRef.value, imagen: preview.src }); 
                };

                document.getElementById('btnCancelarComprobante').onclick = () => {
                    modal.classList.add('hidden');
                    resolve(null); 
                };
            });
        }

        // --- ACTUALIZAR ESTADO ---
        async function cambiarEstadoPedido(idPedido, nuevoEstado, metodoPago) {
            let datosPago = null;
            
            // Si va a pasar a "En Cocina", pedimos el comprobante primero
            if (nuevoEstado === 'En Cocina') {
                datosPago = await pedirComprobantePago(metodoPago);
                if (!datosPago) return; // Si el usuario le dio a "Cancelar", detenemos el proceso
            }

            try {
                const operadorFirma = usuarioActivo ? `${usuarioActivo.nombre} (${usuarioActivo.rol})` : "No registrado";
                const payload = { 
                    id_pedido: idPedido, 
                    estado: nuevoEstado,
                    procesado_por: operadorFirma,
                    referencia_pago: datosPago ? datosPago.referencia : "",
                    imagen_pago: datosPago ? datosPago.imagen : ""
                };

                const response = await fetch(API_ACTUALIZAR_ESTADO, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error('Error al guardar cambio de estado');
                cargarPedidos();
            } catch (error) {
                console.error("Error al actualizar la orden:", error);
                alert("No se pudo actualizar el estado del pedido. Intente nuevamente.");
            }
        }

        // --- MANEJO DE FECHAS ---
        function obtenerFechaHoyCaracas() {
            const opciones = { timeZone: 'America/Caracas', year: 'numeric', month: '2-digit', day: '2-digit' };
            const formateador = new Intl.DateTimeFormat('es-VE', opciones);
            const partes = formateador.formatToParts(new Date());
            const dia = partes.find(p => p.type === 'day').value;
            const mes = partes.find(p => p.type === 'month').value;
            const anio = partes.find(p => p.type === 'year').value;
            return { dia, mes, anio };
        }

        function esPedidoDeHoy(filaTexto) {
            if (!filaTexto) return false;
            const { dia, mes, anio } = obtenerFechaHoyCaracas();
            const textoLimpio = filaTexto.replace(/[\s\uFEFF\xA0]+/g, '');
            const formato1 = `${anio}-${mes}-${dia}`;
            const formato2 = `${dia}${mes}${anio}`;
            const formato3 = `${dia}/${mes}/${anio}`;
            const formato4 = `${anio}${mes}${dia}`;
            return textoLimpio.includes(formato1) || textoLimpio.includes(formato2) || textoLimpio.includes(formato3) || textoLimpio.includes(formato4);
        }

        function normalizarEstado(estadoRaw) {
            if (!estadoRaw) return '';
            return estadoRaw.replace(/[\s\uFEFF\xA0]+/g, '').toLowerCase();
        }

        // --- POLLING ---
        function resetearYArrancarPolling() {
            segundosFaltantes = 15;
            document.getElementById('contadorSegundos').innerText = segundosFaltantes;
            clearInterval(pollingTimer);
            pollingTimer = setInterval(() => {
                segundosFaltantes--;
                document.getElementById('contadorSegundos').innerText = segundosFaltantes;
                if (segundosFaltantes <= 0) {
                    cargarPedidos();
                    segundosFaltantes = 15;
                }
            }, 1000);
        }

        // --- CARGAR DATOS ---
        async function cargarPedidos() {
            try {
                const response = await fetch(API_OBTENER_PEDIDOS + '?_t=' + new Date().getTime());
                if (!response.ok) throw new Error('Error al conectar con la API');
                const datos = await response.json();
                pedidosEnMemoria = Array.isArray(datos) ? datos : [];
                renderizarTablero();
                resetearYArrancarPolling();
            } catch (error) {
                console.error("Error al cargar pedidos:", error);
            }
        }

        // --- RENDERIZAR TABLERO ---
        function renderizarTablero() {
            const colPagoPendiente = document.getElementById('columnaPagoPendiente');
            const colEnCocina = document.getElementById('columnaEnCocina');
            const colFinalizado = document.getElementById('columnaFinalizado');

            colPagoPendiente.innerHTML = '';
            colEnCocina.innerHTML = '';
            colFinalizado.innerHTML = '';

            let conteoPago = 0, conteoCocina = 0, conteoFinalizado = 0;

            pedidosEnMemoria.forEach(pedido => {
                const filaTexto = JSON.stringify(pedido);
                if (!esPedidoDeHoy(filaTexto)) return;

                // 1. ID Corto (Corta todo lo que esté antes del guión)
                const idReal = pedido['ID_Pedido'] || pedido.id_pedido || pedido.ID || 'S/ID';
                const idParts = String(idReal).split('-');
                const idVisual = idParts.length > 1 ? idParts[idParts.length - 1] : idReal;

                const cliente = pedido['Cliente'] || pedido.cliente || 'Desconocido';
                const metodoPago = String(pedido['Método de pago'] || pedido.Metodo_pago || '').replace(/'/g, "\\'");
                
                const montoRaw = pedido['Total Orden'] || pedido['Total Orden '] || pedido.Total_Orden || pedido.monto || 0;
                const montoNumerico = String(montoRaw).replace(/[^0-9.,]/g, '').replace(',', '.');
                const monto = parseFloat(montoNumerico || 0).toFixed(2);
                
                // 2. Extracción de Hora Exacta (Zona Horaria Caracas)
                let hora = '--:--';
                const fechaRaw = pedido['Timestamp'] || pedido['Timestamp '] || pedido.timestamp || '';
                if (fechaRaw) {
                    try {
                        const dateObj = new Date(fechaRaw);
                        if (!isNaN(dateObj)) {
                            hora = dateObj.toLocaleTimeString('en-US', { timeZone: 'America/Caracas', hour: '2-digit', minute: '2-digit', hour12: true });
                        } else {
                            hora = fechaRaw.split('T')[1].substring(0, 5);
                        }
                    } catch(e) {}
                }
                
                const articulos = pedido['Pedido Detallado'] || pedido.Pedido_Detallado || pedido.articulos || 'Detalle no disponible';
                const estadoLimpio = normalizarEstado(String(pedido['Estado'] || pedido['Estado '] || pedido.estado || ''));

                if (estadoLimpio === 'pagopendiente') {
                    conteoPago++;
                    colPagoPendiente.innerHTML += `
                        <div class="bg-slate-700/40 p-4 rounded-lg border border-yellow-500/10 hover:border-yellow-500/30 transition duration-150 space-y-3">
                            <div class="flex justify-between items-start">
                                <span class="text-xs font-bold text-yellow-400 bg-yellow-400/10 px-2 py-0.5 rounded border border-yellow-400/20">#${idVisual}</span>
                                <span class="text-[10px] text-slate-400 font-medium"><i class="fa-regular fa-clock"></i> ${hora}</span>
                            </div>
                            <div>
                                <h4 class="font-bold text-white text-sm truncate">${cliente}</h4>
                                <p class="text-xs text-slate-400 mt-1 line-clamp-2">${articulos}</p>
                            </div>
                            <div class="flex justify-between items-center pt-2 border-t border-slate-600/50">
                                <span class="text-xs font-bold text-slate-300">$${monto}</span>
                                <button onclick="cambiarEstadoPedido('${idReal}', 'En Cocina', '${metodoPago}')" class="bg-yellow-500 hover:bg-yellow-400 text-slate-950 text-xs font-bold px-3 py-1.5 rounded-md transition duration-150 flex items-center gap-1 cursor-pointer shadow-md">
                                    Aceptar <i class="fa-solid fa-arrow-right"></i>
                                </button>
                            </div>
                        </div>
                    `;
                } else if (estadoLimpio === 'encocina') {
                    conteoCocina++;
                    colEnCocina.innerHTML += `
                        <div class="bg-slate-700/40 p-4 rounded-lg border border-sky-500/10 hover:border-sky-500/30 transition duration-150 space-y-3">
                            <div class="flex justify-between items-start">
                                <span class="text-xs font-bold text-sky-400 bg-sky-400/10 px-2 py-0.5 rounded border border-sky-400/20">#${idVisual}</span>
                                <span class="text-[10px] text-slate-400 font-medium"><i class="fa-regular fa-clock"></i> ${hora}</span>
                            </div>
                            <div>
                                <h4 class="font-bold text-white text-sm truncate">${cliente}</h4>
                                <p class="text-xs text-slate-400 mt-1 line-clamp-2">${articulos}</p>
                            </div>
                            <div class="flex justify-between items-center pt-2 border-t border-slate-600/50">
                                <span class="text-xs font-bold text-slate-300">$${monto}</span>
                                <button onclick="cambiarEstadoPedido('${idReal}', 'Finalizado', '${metodoPago}')" class="bg-sky-600 hover:bg-sky-500 text-white text-xs font-bold px-3 py-1.5 rounded-md transition duration-150 flex items-center gap-1 cursor-pointer shadow-md">
                                    Despachar <i class="fa-solid fa-check"></i>
                                </button>
                            </div>
                        </div>
                    `;
                } else if (estadoLimpio === 'finalizado') {
                    conteoFinalizado++;
                    colFinalizado.innerHTML += `
                        <div onclick="abrirModalDetalle('${idReal}')" class="bg-slate-700/20 hover:bg-slate-700/50 p-3 rounded-lg border border-emerald-500/10 hover:border-emerald-500/30 transition duration-150 flex justify-between items-center cursor-pointer">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-semibold text-emerald-400 bg-emerald-400/10 px-2.5 py-1 rounded border border-emerald-400/20">#${idVisual}</span>
                                <span class="text-xs text-slate-400">Ver Recibo</span>
                            </div>
                            <span class="text-sm font-bold text-emerald-400">$${monto}</span>
                        </div>
                    `;
                }
            });

            document.getElementById('cantPagoPendiente').innerText = conteoPago;
            document.getElementById('cantEnCocina').innerText = conteoCocina;
            document.getElementById('cantFinalizado').innerText = conteoFinalizado;
        }

        // --- MODAL DETALLADO ---
        function abrirModalDetalle(idPedido) {
            const pedido = pedidosEnMemoria.find(p => {
                const id = p['ID_Pedido'] || p.id_pedido || p.ID;
                return String(id) === String(idPedido);
            });
            if (!pedido) return;

            const idReal = pedido['ID_Pedido'] || pedido.id_pedido || 'S/ID';
            const idParts = String(idReal).split('-');
            const idVisual = idParts.length > 1 ? idParts[idParts.length - 1] : idReal;

            const cliente = pedido['Cliente'] || pedido.cliente || 'Cliente Registrado';
            const telefono = pedido['Teléfono'] || pedido.telefono || 'No registrado';
            const tipoEntrega = pedido['Tipo de entrega'] || pedido.Tipo_entrega || 'No definido';
            const direccion = pedido['Dirección'] || pedido.direccion || 'No especificada';
            const metodoPago = pedido['Método de pago'] || pedido.Metodo_pago || 'No especificado';
            const articulos = pedido['Pedido Detallado'] || pedido.Pedido_Detallado || '';
            
            const montoRaw = pedido['Total Orden'] || pedido['Total Orden '] || 0;
            const montoNumerico = String(montoRaw).replace(/[^0-9.,]/g, '').replace(',', '.');
            const montoUSD = parseFloat(montoNumerico || 0);
            
            const procesadoPor = pedido['Procesado Por'] || pedido['Procesado_Por'] || 'Sin registro de operador';
            
            document.getElementById('modalID').innerText = `ID Pedido: #${idVisual}`;

            let seccionCambioVES = '';
            if (metodoPago.toLowerCase().includes('pago') || metodoPago.toLowerCase().includes('movil') || metodoPago.toLowerCase().includes('móvil')) {
                const tasaBCV = parseFloat(document.getElementById('tasaBCV').value) || 1.0;
                const montoVES = (montoUSD * tasaBCV).toFixed(2);
                seccionCambioVES = `
                    <div class="bg-amber-500/10 border border-amber-500/20 p-3 rounded-lg mt-2 text-amber-300 text-xs text-center font-bold">
                        Total en Bolívares: Bs. ${montoVES} (Tasa: ${tasaBCV.toFixed(2)} Bs/$)
                    </div>
                `;
            }

            document.getElementById('modalCuerpo').innerHTML = `
                <div class="space-y-3.5">
                    <div class="flex justify-between">
                        <div>
                            <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Cliente</span>
                            <p class="font-bold text-white text-base">${cliente}</p>
                            <p class="text-xs text-slate-400 mt-0.5"><i class="fa-solid fa-phone"></i> ${telefono}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider text-right block">Despachado por</span>
                            <p class="text-xs text-white bg-slate-900 border border-slate-700 px-2 py-1 rounded mt-1 font-semibold">${procesadoPor}</p>
                        </div>
                    </div>
                    <div class="border-t border-slate-700/50 pt-2.5">
                        <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Método de Distribución</span>
                        <p class="text-white text-xs mt-0.5 font-medium">${tipoEntrega}</p>
                        <p class="text-xs text-slate-400 mt-1 bg-slate-900/40 p-2 rounded border border-slate-700/30 italic">${direccion}</p>
                    </div>
                    <div class="border-t border-slate-700/50 pt-2.5">
                        <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Productos</span>
                        <div class="text-xs bg-slate-900/40 p-2.5 rounded border border-slate-700/30 whitespace-pre-line max-h-32 overflow-y-auto text-slate-300 font-mono">${articulos}</div>
                    </div>
                    <div class="border-t border-slate-700/50 pt-2.5 flex justify-between items-center">
                        <div>
                            <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Forma de Pago</span>
                            <p class="text-white text-xs font-semibold">${metodoPago}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Total</span>
                            <p class="text-emerald-400 font-bold text-lg">$${montoUSD.toFixed(2)}</p>
                        </div>
                    </div>
                    ${seccionCambioVES}
                </div>
            `;
            document.getElementById('modalDetalle').classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modalDetalle').classList.add('hidden'); }

        window.addEventListener('DOMContentLoaded', () => {
            actualizarTasaBCV();
            verificarSesion();
        });
    </script>
</body>
</html>
