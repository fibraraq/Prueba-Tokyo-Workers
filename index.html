<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokio Sushi | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos personalizados para la barra de desplazamiento y modales */
        body { background-color: #0f172a; color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <header class="bg-gray-900 border-b border-gray-700 p-4 flex justify-between items-center shadow-lg shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🍣</span>
            <h1 class="text-xl font-bold text-red-500 tracking-wide">Tokio Sushi <span class="text-gray-400 text-sm font-normal">| Panel de Control</span></h1>
        </div>
        <div class="flex gap-3">
            <button onclick="abrirModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-md font-semibold transition flex items-center gap-2 shadow-lg">
                <i class="fa-solid fa-plus"></i> Procesar Pedido
            </button>
            <button onclick="cargarPedidos()" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-md font-semibold transition flex items-center gap-2 shadow-lg">
                <i class="fa-solid fa-rotate"></i> Actualizar Pedidos
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-hidden p-6">
        <div class="flex gap-6 h-full w-full overflow-x-auto">
            
            <div class="bg-gray-800 rounded-lg flex flex-col w-[350px] shrink-0 border border-gray-700 shadow-xl">
                <div class="p-3 border-b border-gray-700 flex justify-between items-center bg-gray-800 rounded-t-lg">
                    <h2 class="font-bold text-yellow-500 flex items-center gap-2"><i class="fa-solid fa-hourglass-half"></i> Pago Pendiente</h2>
                    <span id="count-pendientes" class="bg-gray-700 text-yellow-500 text-xs px-2 py-1 rounded-full font-bold">0</span>
                </div>
                <div id="col-pendientes" class="p-3 flex-1 overflow-y-auto flex flex-col gap-3">
                    </div>
            </div>

            <div class="bg-gray-800 rounded-lg flex flex-col w-[350px] shrink-0 border border-gray-700 shadow-xl">
                <div class="p-3 border-b border-gray-700 flex justify-between items-center bg-gray-800 rounded-t-lg">
                    <h2 class="font-bold text-orange-500 flex items-center gap-2"><i class="fa-solid fa-fire"></i> En Cocina</h2>
                    <span id="count-cocina" class="bg-gray-700 text-orange-500 text-xs px-2 py-1 rounded-full font-bold">0</span>
                </div>
                <div id="col-cocina" class="p-3 flex-1 overflow-y-auto flex flex-col gap-3"></div>
            </div>

            <div class="bg-gray-800 rounded-lg flex flex-col w-[350px] shrink-0 border border-gray-700 shadow-xl">
                <div class="p-3 border-b border-gray-700 flex justify-between items-center bg-gray-800 rounded-t-lg">
                    <h2 class="font-bold text-green-500 flex items-center gap-2"><i class="fa-solid fa-check-double"></i> Finalizado</h2>
                    <span id="count-finalizado" class="bg-gray-700 text-green-500 text-xs px-2 py-1 rounded-full font-bold">0</span>
                </div>
                <div id="col-finalizado" class="p-3 flex-1 overflow-y-auto flex flex-col gap-3"></div>
            </div>

        </div>
    </main>

    <div id="modalPedido" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 transition-opacity">
        <div class="bg-gray-800 border border-gray-600 rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900 rounded-t-xl">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square text-emerald-500"></i> Registrar Nuevo Pedido
                </h2>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-red-500 transition text-xl">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="p-6 overflow-y-auto flex-1">
                <form id="formNuevoPedido" class="space-y-4">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Nombre del Cliente</label>
                            <input type="text" id="inputCliente" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-emerald-500" placeholder="Ej. Alexander Guerra">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Teléfono (WhatsApp)</label>
                            <input type="text" id="inputTelefono" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-emerald-500" placeholder="04121234567">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Tipo de Entrega</label>
                            <select id="inputEntrega" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-emerald-500">
                                <option value="Delivery">🛵 Delivery</option>
                                <option value="Pickup">🚶‍♂️ Pickup (Para llevar)</option>
                                <option value="En el Local">🍽️ Consumo en el local</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Método de Pago</label>
                            <select id="inputPago" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-emerald-500">
                                <option value="Pago Movil">📱 Pago Móvil</option>
                                <option value="Zelle">💵 Zelle</option>
                                <option value="Efectivo">💰 Efectivo</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Dirección / Número de Mesa</label>
                        <input type="text" id="inputDireccion" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-emerald-500" placeholder="Dirección de entrega o N° de Mesa si es en local">
                    </div>

                    <hr class="border-gray-700 my-4">

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-bold text-emerald-400">Artículos del Pedido</label>
                            <button type="button" onclick="agregarFilaArticulo()" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-white transition">
                                + Añadir ítem
                            </button>
                        </div>
                        <div id="contenedorArticulos" class="space-y-2">
                            <div class="flex gap-2 articulo-fila">
                                <input type="number" min="1" value="1" required class="w-16 bg-gray-700 border border-gray-600 rounded p-2 text-white text-center item-qty" placeholder="Cant.">
                                <input type="text" required class="flex-1 bg-gray-700 border border-gray-600 rounded p-2 text-white item-name" placeholder="Nombre del plato (Ej. Arroz Oriental)">
                                <input type="number" step="0.01" min="0" required class="w-24 bg-gray-700 border border-gray-600 rounded p-2 text-white item-price" placeholder="Precio $">
                                <button type="button" onclick="eliminarFilaArticulo(this)" class="bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white px-3 rounded transition"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="p-4 border-t border-gray-700 bg-gray-900 rounded-b-xl flex justify-end gap-3">
                <button onclick="cerrarModal()" class="px-4 py-2 text-gray-300 hover:text-white font-semibold transition">Cancelar</button>
                <button onclick="enviarPedido(event)" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-md font-bold shadow-lg transition">
                    Procesar y Enviar a Cocina <i class="fa-solid fa-paper-plane ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. Configuración: REEMPLAZA ESTA URL CON TU WEBHOOK DE N8N DE "NUEVO PEDIDO"
        const WEBHOOK_NUEVO_PEDIDO = "https://n8n-production-633e.up.railway.app/webhook-test/Prueba-tokyo"; 

        // ====== LÓGICA DEL MODAL ======
        function abrirModal() {
            document.getElementById('modalPedido').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalPedido').classList.add('hidden');
            document.getElementById('formNuevoPedido').reset(); // Limpia el formulario
        }

        // ====== LÓGICA DE ARTÍCULOS DINÁMICOS ======
        function agregarFilaArticulo() {
            const contenedor = document.getElementById('contenedorArticulos');
            const fila = document.createElement('div');
            fila.className = "flex gap-2 articulo-fila";
            fila.innerHTML = `
                <input type="number" min="1" value="1" required class="w-16 bg-gray-700 border border-gray-600 rounded p-2 text-white text-center item-qty" placeholder="Cant.">
                <input type="text" required class="flex-1 bg-gray-700 border border-gray-600 rounded p-2 text-white item-name" placeholder="Nombre del plato">
                <input type="number" step="0.01" min="0" required class="w-24 bg-gray-700 border border-gray-600 rounded p-2 text-white item-price" placeholder="Precio $">
                <button type="button" onclick="eliminarFilaArticulo(this)" class="bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white px-3 rounded transition"><i class="fa-solid fa-trash"></i></button>
            `;
            contenedor.appendChild(fila);
        }

        function eliminarFilaArticulo(btn) {
            const filas = document.querySelectorAll('.articulo-fila');
            if(filas.length > 1) { // Evita borrar si solo queda uno
                btn.parentElement.remove();
            } else {
                alert("El pedido debe tener al menos un artículo.");
            }
        }

        // ====== ENVIAR PEDIDO A N8N ======
        async function enviarPedido(e) {
            e.preventDefault();

            // Validar que los campos obligatorios estén llenos
            const form = document.getElementById('formNuevoPedido');
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Recopilar los artículos de las filas
            let listaArticulos = [];
            document.querySelectorAll('.articulo-fila').forEach(fila => {
                listaArticulos.push({
                    qty: parseInt(fila.querySelector('.item-qty').value),
                    name: fila.querySelector('.item-name').value,
                    price: parseFloat(fila.querySelector('.item-price').value),
                    note: "" // Dejado en blanco para mantener la compatibilidad con tu código n8n
                });
            });

            // Construir el JSON exacto que espera tu n8n
            const payload = {
                cliente: document.getElementById('inputCliente').value,
                telefono: document.getElementById('inputTelefono').value,
                tipo_entrega: document.getElementById('inputEntrega').value,
                metodo_pago: document.getElementById('inputPago').value,
                direccion: document.getElementById('inputDireccion').value || "No especificada",
                articulos: listaArticulos
            };

            try {
                // Enviar datos al Webhook de n8n
                const response = await fetch(WEBHOOK_NUEVO_PEDIDO, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    alert("✅ Pedido generado y enviado con éxito.");
                    cerrarModal();
                    cargarPedidos(); // Refresca el tablero para mostrar el nuevo pedido
                } else {
                    alert("❌ Hubo un error al enviar el pedido.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("❌ No se pudo conectar con el servidor.");
            }
        }

        // ====== AQUÍ VA TU CÓDIGO ANTERIOR DE CARGAR/ACTUALIZAR TARJETAS ======
        // (Asegúrate de mantener las funciones que ya tenías para renderizar las tarjetas y moverlas de columna)
        function cargarPedidos() {
            console.log("Actualizando tablero...");
            // Tu función fetch original hacia el GET webhook de n8n para dibujar las tarjetas
        }

    </script>
</body>
</html>
