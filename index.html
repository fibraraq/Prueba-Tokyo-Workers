<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Pedidos - Tokio Sushi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-red-500 flex items-center gap-2">
                🍣 Tokio Sushi <span class="text-sm font-normal text-gray-400">| Panel de Control</span>
            </h1>
            <div class="flex gap-3">
                <button onclick="abrirModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-4 rounded-lg transition shadow-md flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Procesar Pedido
                </button>
                <button onclick="cargarPedidos()" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition shadow-md flex items-center gap-2">
                    <i class="fa-solid fa-rotate"></i> Actualizar Pedidos
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h2 class="text-lg font-bold text-yellow-500 flex items-center gap-2">⏳ Pago Pendiente</h2>
                    <span id="cant-pendiente" class="bg-yellow-500/20 text-yellow-400 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
                </div>
                <div id="columna-pendiente" class="space-y-4 min-h-[500px]"></div>
            </div>

            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h2 class="text-lg font-bold text-orange-500 flex items-center gap-2">🔥 En Cocina</h2>
                    <span id="cant-cocina" class="bg-orange-500/20 text-orange-400 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
                </div>
                <div id="columna-cocina" class="space-y-4 min-h-[500px]"></div>
            </div>

            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h2 class="text-lg font-bold text-green-500 flex items-center gap-2">✅ Finalizado</h2>
                    <span id="cant-finalizado" class="bg-green-500/20 text-green-400 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
                </div>
                <div id="columna-finalizado" class="space-y-4 min-h-[500px]"></div>
            </div>
        </div>
    </main>

    <!-- Modal Pedido -->
    <div id="modalPedido" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 border border-gray-600 rounded-xl w-full max-w-lg shadow-2xl">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-lg font-bold">Registrar Nuevo Pedido</h2>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4">
                <form id="formNuevoPedido" class="space-y-3" onsubmit="return false;">
                    <input type="text" id="inputCliente" placeholder="Nombre del Cliente" class="w-full bg-gray-700 p-2 rounded border border-gray-600">
                    <input type="text" id="inputTelefono" placeholder="Teléfono" class="w-full bg-gray-700 p-2 rounded border border-gray-600">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <select id="inputEntrega" class="bg-gray-700 p-2 rounded border border-gray-600">
                            <option value="Delivery">Delivery</option>
                            <option value="Pickup">Pickup</option>
                            <option value="En el Local">En el Local</option>
                        </select>
                        <select id="inputPago" class="bg-gray-700 p-2 rounded border border-gray-600">
                            <option value="Pago Movil">Pago Móvil</option>
                            <option value="Zelle">Zelle</option>
                            <option value="Efectivo">Efectivo</option>
                        </select>
                    </div>
                    
                    <input type="text" id="inputDireccion" placeholder="Dirección / Mesa" class="w-full bg-gray-700 p-2 rounded border border-gray-600">
                    
                    <div id="contenedorArticulos" class="space-y-2 border-t border-gray-700 pt-3">
                        <div class="flex gap-2 articulo-fila">
                            <input type="number" value="1" class="w-16 bg-gray-700 p-2 rounded item-qty" placeholder="Cant">
                            <input type="text" class="flex-1 bg-gray-700 p-2 rounded item-name" placeholder="Plato">
                            <input type="number" step="0.01" class="w-20 bg-gray-700 p-2 rounded item-price" placeholder="Precio">
                            <div class="w-8"></div>
                        </div>
                    </div>
                    <button type="button" onclick="agregarFila()" class="text-xs text-emerald-400 underline">+ Añadir otro plato</button>
                </form> 
             </div>
            <div class="p-4 border-t border-gray-700 flex justify-end gap-2">
                <button type="button" onclick="cerrarModal()" class="px-4 py-2 text-gray-400 hover:text-white">Cancelar</button>
                <button type="button" onclick="enviarPedido()" class="bg-emerald-600 px-4 py-2 rounded font-bold hover:bg-emerald-500">Procesar Pedido</button>
            </div>
        </div>
    </div>

    <!-- Modal Tiempo en Cocina -->
    <div id="modalTiempo" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 border border-gray-600 rounded-xl w-full max-w-sm shadow-2xl">
            <div class="p-4 border-b border-gray-700">
                <h2 class="text-lg font-bold text-white">⏳ Tiempo de preparación</h2>
                <p class="text-xs text-gray-400 mt-1">¿En cuántos minutos estará listo el pedido?</p>
            </div>
            <div class="p-4 space-y-3">
                <div class="flex gap-2">
                    <button type="button" onclick="seleccionarTiempo(30, this)" class="btn-tiempo flex-1 bg-gray-700 hover:bg-gray-600 border border-gray-600 rounded p-2 font-bold text-white transition">30 min</button>
                    <button type="button" onclick="seleccionarTiempo(45, this)" class="btn-tiempo flex-1 bg-gray-700 hover:bg-gray-600 border border-gray-600 rounded p-2 font-bold text-white transition">45 min</button>
                </div>
                <div>
                    <input type="number" id="inputTiempoPersonalizado" placeholder="Personalizado (ej. 15)" class="w-full bg-gray-700 p-2 rounded border border-gray-600 text-white placeholder-gray-400 focus:border-orange-500 focus:outline-none" oninput="limpiarBotonesTiempo()">
                </div>
            </div>
            <div class="p-4 border-t border-gray-700 flex justify-end gap-2">
                <button type="button" id="btnCancelarTiempo" class="px-4 py-2 text-gray-400 hover:text-white transition">Cancelar</button>
                <button type="button" id="btnAceptarTiempo" class="bg-orange-600 px-4 py-2 rounded font-bold text-white hover:bg-orange-500 transition">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- Modal Comprobante de Pago -->
    <div id="modalComprobante" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 border border-gray-600 rounded-xl w-full max-w-sm shadow-2xl">
            <div class="p-4 border-b border-gray-700">
                <h2 class="text-lg font-bold text-emerald-400">🧾 Comprobante de Pago</h2>
                <p id="txtMetodoPagoModal" class="text-xs text-gray-400 mt-1"></p>
            </div>
            <div class="p-4 space-y-3">
                <div id="contenedorReferencia">
                    <label class="block text-xs text-gray-400 mb-1">Número de Referencia</label>
                    <input type="text" id="inputReferencia" placeholder="Ej. 12345678" class="w-full bg-gray-700 p-2 rounded border border-gray-600 text-white focus:border-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Subir Imagen (Capture o Billete)</label>
                    <input type="file" id="inputImagenPago" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-emerald-400 hover:file:bg-gray-600 transition">
                </div>
                <div class="mt-2 flex justify-center">
                    <img id="previewComprobante" class="hidden max-h-40 rounded border border-gray-600 object-contain shadow-md">
                </div>
            </div>
            <div class="p-4 border-t border-gray-700 flex justify-end gap-2">
                <button type="button" id="btnCancelarComprobante" class="px-4 py-2 text-gray-400 hover:text-white transition">Cancelar</button>
                <button type="button" id="btnAceptarComprobante" class="bg-emerald-600 px-4 py-2 rounded font-bold text-white hover:bg-emerald-500 transition">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        const URL_LEER = 'https://n8n-production-633e.up.railway.app/webhook/obtener-pedidos';
        const URL_ACTUALIZAR = 'https://n8n-production-633e.up.railway.app/webhook/actualizar-estado';
        const URL_NUEVO_PEDIDO = 'https://n8n-production-633e.up.railway.app/webhook/Prueba-tokyo';

        let tasaBCV = 36.5; 
        
        async function inicializarDashboard() {
            try {
                const res = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                const data = await res.json();
                tasaBCV = data.promedio;
            } catch(e) {
                console.log('Error obteniendo tasa BCV:', e);
            }
            cargarPedidos();
        }

        function abrirModal() { document.getElementById('modalPedido').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modalPedido').classList.add('hidden'); }
        
        document.getElementById('formNuevoPedido').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                return false;
            }
        });

        function agregarFila() {
            const div = document.createElement('div');
            div.className = "flex gap-2 articulo-fila";
            div.innerHTML = `
                <input type="number" value="1" class="w-16 bg-gray-700 p-2 rounded item-qty" placeholder="Cant">
                <input type="text" class="flex-1 bg-gray-700 p-2 rounded item-name" placeholder="Plato">
                <input type="number" step="0.01" class="w-20 bg-gray-700 p-2 rounded item-price" placeholder="Precio">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:text-red-300 w-8">
                    <i class="fa-solid fa-trash"></i>
                </button>`;
            document.getElementById('contenedorArticulos').appendChild(div);
        }

        async function enviarPedido() {
            const articulos = Array.from(document.querySelectorAll('.articulo-fila')).map(f => ({
                qty: f.querySelector('.item-qty').value,
                name: f.querySelector('.item-name').value,
                price: parseFloat(f.querySelector('.item-price').value)
            }));
            
            const payload = {
                cliente: document.getElementById('inputCliente').value,
                telefono: document.getElementById('inputTelefono').value,
                tipo_entrega: document.getElementById('inputEntrega').value,
                metodo_pago: document.getElementById('inputPago').value,
                direccion: document.getElementById('inputDireccion').value,
                articulos: articulos,
                timestamp: new Date().toISOString()
            };

            try {
                const res = await fetch(URL_NUEVO_PEDIDO, { 
                    method: 'POST', 
                    body: JSON.stringify(payload), 
                    headers: {'Content-Type': 'application/json'} 
                });
                
                if(res.ok) { 
                    alert("Pedido registrado con éxito"); 
                    document.getElementById('formNuevoPedido').reset();
                    document.getElementById('contenedorArticulos').innerHTML = `
                        <div class="flex gap-2 articulo-fila">
                            <input type="number" value="1" class="w-16 bg-gray-700 p-2 rounded item-qty" placeholder="Cant">
                            <input type="text" class="flex-1 bg-gray-700 p-2 rounded item-name" placeholder="Plato">
                            <input type="number" step="0.01" class="w-20 bg-gray-700 p-2 rounded item-price" placeholder="Precio">
                            <div class="w-8"></div>
                        </div>`;
                    cerrarModal();
                    setTimeout(cargarPedidos, 500);
                } else {
                    alert("Error al guardar el pedido.");
                }
            } catch(e) { 
                alert("Error de conexión."); 
            }
        }

        async function cargarPedidos() {
            try {
                const respuesta = await fetch(URL_LEER + '?_t=' + new Date().getTime());
                const pedidos = await respuesta.json();
                
                document.getElementById('columna-pendiente').innerHTML = '';
                document.getElementById('columna-cocina').innerHTML = '';
                document.getElementById('columna-finalizado').innerHTML = '';
                let cp = 0, cc = 0, cf = 0;
                
                // Construimos las fechas clave para evaluar
                const dateVzla = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Caracas"}));
                const dd = String(dateVzla.getDate()).padStart(2, '0');
                const mm = String(dateVzla.getMonth() + 1).padStart(2, '0');
                const yyyy = dateVzla.getFullYear();
                
                const fechaHoyES = `${dd}/${mm}/${yyyy}`; // Ej: "29/05/2026" (Tu nueva lógica)
                const fechaHoyISO = `${yyyy}-${mm}-${dd}`; // Ej: "2026-05-29" (Para revisar tu columna Fecha)
                const fechaHoyPegada = `${dd}${mm}${yyyy}`; // Ej: "29052026" (Para rescatar los pedidos de esta mañana)
                
                pedidos.forEach(pedido => {
                    const idReal = String(pedido.ID_Pedido || pedido.id_pedido || '').trim();
                    const fechaAnotada = String(pedido.Fecha || pedido.fecha || pedido.Timestamp || '').trim();
                    
                    // ==========================================
                    // TRIPLE FILTRO DE FECHA (Indestructible)
                    // ==========================================
                    const esDeHoy = idReal.includes(fechaHoyES) || idReal.includes(fechaHoyPegada) || fechaAnotada.includes(fechaHoyISO);
                    
                    if (!esDeHoy) return; // Ignora los de días anteriores
                    
                    // Separa el ID por el guion y muestra solo el último número ("1")
                    const partesId = idReal.split('-');
                    const idVisual = partesId.length > 1 ? partesId[partesId.length - 1] : idReal;

                    // Limpieza absoluta del estado
                    const estadoRaw = String(pedido.Estado || pedido.estado || '').toLowerCase();
                    const estadoLimpio = estadoRaw.replace(/[\s\uFEFF\xA0]+/g, ''); 
                    
                    const safeCliente = String(pedido.Cliente || '').replace(/'/g, "\\'");
                    const safeTelefono = String(pedido.Teléfono || '').replace(/'/g, "\\'");
                    const safeEntrega = String(pedido['Tipo de entrega'] || pedido.Tipo_entrega || '').replace(/'/g, "\\'");
                    const safeDireccion = String(pedido.Dirección || pedido.Direccion || '').replace(/'/g, "\\'");
                    const safeMetodo = String(pedido['Método de pago'] || pedido.Metodo_pago || '').replace(/'/g, "\\'");
                    const totalDolares = parseFloat(pedido.Total_Orden || pedido['Total Orden'] || pedido['Total_Orden'] || 0).toFixed(2);
                    
                    const tarjeta = document.createElement('div');

                    // ==========================================
                    // RAMA 1: FINALIZADO
                    // ==========================================
                    if (estadoLimpio === 'finalizado') {
                        let infoMonto = `<span class="text-lg font-bold text-green-400">$${totalDolares}</span>`;
                        
                        if (safeMetodo.toLowerCase().includes('movil') || safeMetodo.toLowerCase().includes('móvil')) {
                            const totalBs = (parseFloat(totalDolares) * tasaBCV).toFixed(2);
                            infoMonto = `
                                <div class="flex flex-col text-right">
                                    <span class="text-lg font-bold text-green-400">$${totalDolares}</span>
                                    <span class="text-xs font-bold text-gray-400">Bs. ${totalBs}</span>
                                </div>`;
                        }

                        tarjeta.className = 'bg-gray-800 rounded-lg p-3 shadow border border-gray-700 flex justify-between items-center transition opacity-80 hover:opacity-100 hover:border-gray-500';
                        tarjeta.innerHTML = `
                            <div class="flex items-center gap-3">
                                <span class="text-xl font-mono font-bold text-gray-400 bg-gray-900 px-3 py-1 rounded border border-gray-700 shadow-inner">
                                    <i class="fa-solid fa-check text-green-500 mr-1 text-sm"></i> ${idVisual}
                                </span>
                            </div>
                            ${infoMonto}
                        `;
                        
                        document.getElementById('columna-finalizado').appendChild(tarjeta);
                        cf++;
                    
                    // ==========================================
                    // RAMA 2: PENDIENTE Y COCINA
                    // ==========================================
                    } else if (estadoLimpio === 'pagopendiente' || estadoLimpio === 'encocina') {
                        let botonAccion = '';
                        if (estadoLimpio === 'pagopendiente') {
                            botonAccion = `<button onclick="cambiarEstado('${idReal}', 'En Cocina', '${safeTelefono}', '${safeCliente}', '${safeEntrega}', '${safeMetodo}')" class="w-full mt-3 bg-orange-600 hover:bg-orange-700 text-white text-xs font-bold py-2 px-3 rounded shadow transition">💵 Procesar Pago</button>`;
                        } else if (estadoLimpio === 'encocina') {
                            botonAccion = `<button onclick="cambiarEstado('${idReal}', 'Finalizado', '${safeTelefono}', '${safeCliente}', '${safeEntrega}', '')" class="w-full mt-3 bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-2 px-3 rounded shadow transition">✅ Finalizar Pedido</button>`;
                        }
                        
                        let colorTarjeta = 'bg-gray-700 border-gray-600 hover:border-gray-500';
                        if (safeEntrega.toLowerCase() === 'pickup') {
                            colorTarjeta = 'bg-indigo-900 border-indigo-500 hover:border-indigo-400';
                        }

                        let htmlDireccion = '';
                        if (safeEntrega.toLowerCase() === 'delivery' && safeDireccion.trim() !== '') {
                            htmlDireccion = `<div class="mb-2 bg-gray-900/50 p-2 rounded border border-gray-600 text-xs text-blue-200"><i class="fa-solid fa-motorcycle"></i> <b>Dirección:</b> ${safeDireccion}</div>`;
                        }
                        
                        tarjeta.className = `${colorTarjeta} rounded-lg p-4 shadow border transition`;
                        tarjeta.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xl font-mono font-bold text-white bg-gray-800 px-3 py-1 rounded border border-gray-500 shadow">${idVisual}</span>
                                <span class="text-sm font-bold text-green-400 text-lg">$${totalDolares}</span>
                            </div>
                            <h3 class="font-bold text-white mb-1 text-base">${pedido.Cliente}</h3>
                            <p class="text-xs text-gray-400 mb-2">📞 ${safeTelefono} | 📍 ${safeEntrega}</p>
                            
                            ${htmlDireccion}

                            <div class="bg-gray-800/80 rounded p-2 text-xs text-gray-300 font-mono mb-3 whitespace-pre-line border border-gray-700/50">${pedido['Pedido Detallado'] || pedido.Pedido_Detallado}</div>
                            <div class="text-xs text-gray-400">💳 ${safeMetodo}</div>
                            ${botonAccion}
                        `;
                        
                        if (estadoLimpio === 'pagopendiente') { document.getElementById('columna-pendiente').appendChild(tarjeta); cp++; }
                        else if (estadoLimpio === 'encocina') { document.getElementById('columna-cocina').appendChild(tarjeta); cc++; }
                    }
                });
                
                document.getElementById('cant-pendiente').innerText = cp;
                document.getElementById('cant-cocina').innerText = cc;
                document.getElementById('cant-finalizado').innerText = cf;
            } catch (error) { console.error('Error cargando pedidos:', error); }
        }
        
        let tiempoSeleccionado = null;

        function seleccionarTiempo(minutos, botonElement) {
            tiempoSeleccionado = minutos;
            document.getElementById('inputTiempoPersonalizado').value = ''; 
            document.querySelectorAll('.btn-tiempo').forEach(btn => btn.classList.remove('border-orange-500', 'text-orange-400'));
            botonElement.classList.add('border-orange-500', 'text-orange-400');
        }

        function limpiarBotonesTiempo() {
            tiempoSeleccionado = null;
            document.querySelectorAll('.btn-tiempo').forEach(btn => btn.classList.remove('border-orange-500', 'text-orange-400'));
        }

        document.getElementById('inputImagenPago').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('previewComprobante');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            } else {
                preview.src = "";
                preview.classList.add('hidden');
            }
        });

        function pedirComprobantePago(metodoPago) {
            return new Promise((resolve) => {
                const modal = document.getElementById('modalComprobante');
                const contenedorRef = document.getElementById('contenedorReferencia');
                const inputRef = document.getElementById('inputReferencia');
                const inputImg = document.getElementById('inputImagenPago');
                const preview = document.getElementById('previewComprobante');
                const txtMetodo = document.getElementById('txtMetodoPagoModal');

                inputRef.value = '';
                inputImg.value = '';
                preview.src = '';
                preview.classList.add('hidden');
                
                const metodoLimpio = metodoPago || "Desconocido";
                txtMetodo.innerText = `Método de pago del cliente: ${metodoLimpio}`;

                const metodoLower = metodoLimpio.toLowerCase();
                if (metodoLower.includes('efectivo')) {
                    contenedorRef.classList.add('hidden');
                } else {
                    contenedorRef.classList.remove('hidden');
                }

                modal.classList.remove('hidden');

                document.getElementById('btnAceptarComprobante').onclick = () => {
                    if (inputImg.files.length === 0) {
                        alert("Para continuar la demostración, sube una imagen.");
                        return;
                    }
                    if (!contenedorRef.classList.contains('hidden') && inputRef.value.trim() === '') {
                        alert("Por favor, ingresa el número de referencia.");
                        return;
                    }
                    
                    modal.classList.add('hidden');
                    resolve(true); 
                };

                document.getElementById('btnCancelarComprobante').onclick = () => {
                    modal.classList.add('hidden');
                    resolve(false); 
                };
            });
        }

        function pedirTiempoCocina() {
            return new Promise((resolve) => {
                const modal = document.getElementById('modalTiempo');
                const inputPersonalizado = document.getElementById('inputTiempoPersonalizado');
                
                limpiarBotonesTiempo();
                inputPersonalizado.value = '';
                modal.classList.remove('hidden');
                
                document.getElementById('btnAceptarTiempo').onclick = () => {
                    let tiempoFinal = tiempoSeleccionado || inputPersonalizado.value;
                    if (!tiempoFinal || tiempoFinal <= 0) {
                        alert("Por favor selecciona o ingresa un tiempo válido.");
                        return;
                    }
                    modal.classList.add('hidden');
                    resolve(tiempoFinal);
                };

                document.getElementById('btnCancelarTiempo').onclick = () => {
                    modal.classList.add('hidden');
                    resolve(null);
                };
            });
        }
        
        async function cambiarEstado(idPedido, nuevoEstado, telefono, cliente, tipoEntrega, metodoPago) {
            let tiempoEstimado = "";
            
            if (nuevoEstado === 'En Cocina') {
                const comprobanteExitoso = await pedirComprobantePago(metodoPago);
                if (!comprobanteExitoso) return; 

                tiempoEstimado = await pedirTiempoCocina();
                if (tiempoEstimado === null) return; 
            }

            try {
                const respuesta = await fetch(URL_ACTUALIZAR, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id: idPedido, 
                        estado: nuevoEstado,
                        telefono: telefono,
                        cliente: cliente,
                        tipo_entrega: tipoEntrega,
                        tiempo_estimado: tiempoEstimado
                    })
                });
                
                if (respuesta.ok) {
                    setTimeout(cargarPedidos, 800);
                } else {
                    alert('Error al cambiar estado.');
                }
            } catch (error) { 
                console.error('Error:', error); 
            }
        }

        window.onload = inicializarDashboard;
    </script>
</html>
